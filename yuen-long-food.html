  <title>元朗美食全集</title>
  <style>
    :root{
      --bg: #f5f3ef;
      --card: #ffffff;
      --text: #2d3436;
      --muted: #636e72;
      --line: rgba(0,0,0,0.06);
      --brand: #e67e22;
      --brand2: #d35400;
      --brand-light: rgba(230, 126, 34, 0.08);
      --good: #27ae60;
      --warn: #f1c40f;
      --bad: #e74c3c;
      --shadow: 0 2px 16px rgba(0,0,0,0.06);
      --radius: 16px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --c-jp: #e17055;
      --c-western: #0984e3;
      --c-hk: #fdcb6e;
      --c-kr: #6c5ce7;
      --c-thai: #00b894;
      --c-hotpot: #d63031;
      --c-snack: #00cec9;
      --c-other: #636e72;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang HK", sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap{
      max-width: 600px;
      margin: 0 auto;
      padding: calc(20px + var(--safeTop)) 16px calc(40px + var(--safeBottom)) 16px;
    }
    header{
      margin-bottom: 24px;
    }
    h1{
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px 0;
      background: linear-gradient(135deg, #e67e22, #d35400);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle{
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .search{
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .search input{
      border: none;
      outline: none;
      width: 100%;
      font-size: 15px;
      background: transparent;
    }
    .chipRow{
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 0;
      scrollbar-width: none;
    }
    .chipRow::-webkit-scrollbar{display:none;}
    .chip{
      padding: 8px 16px;
      border-radius: 100px;
      background: #fff;
      border: 1px solid var(--line);
      font-size: 13px;
      white-space: nowrap;
      color: var(--muted);
      transition: all 0.2s;
    }
    .chip.active{
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
      font-weight: 600;
    }
    /* 右上角菜色標籤 */
    .cornerCuisine{
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
      background: rgba(0,0,0,0.04);
      color: var(--muted);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      z-index: 2;
    }
    .cornerCuisine.cat-日式{ background: rgba(225,112,85,0.12); color: #c0392b; }
    .cornerCuisine.cat-西式{ background: rgba(9,132,227,0.12); color: #0742a3; }
    .cornerCuisine.cat-港式{ background: rgba(253,203,110,0.18); color: #b8860b; }
    .cornerCuisine.cat-韓式{ background: rgba(108,92,231,0.12); color: #4a3fb8; }
    .cornerCuisine.cat-泰式{ background: rgba(0,184,148,0.12); color: #006d5b; }
    .cornerCuisine.cat-火鍋{ background: rgba(214,48,49,0.12); color: #b71c1c; }
    .cornerCuisine.cat-多國{ background: rgba(9,132,227,0.12); color: #0742a3; }
    .cornerCuisine.cat-小食{ background: rgba(0,206,201,0.12); color: #00807f; }
    .cornerCuisine.cat-台式{ background: rgba(108,92,231,0.12); color: #4a3fb8; }
    .cornerCuisine.cat-潮州{ background: rgba(225,112,85,0.12); color: #c0392b; }
    .cornerCuisine.cat-滬菜{ background: rgba(225,112,85,0.12); color: #c0392b; }

    /* 距離徽章 */
    .distBadge{
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-light);
      padding: 4px 10px;
      border-radius: 100px;
      margin-left: 8px;
    }

    /* 美化卡片 */
    .card{
      background: var(--card);
      border-radius: 20px;
      padding: 24px 20px 20px 20px;
      margin-bottom: 16px;
      border: 1px solid var(--line);
      border-left: 5px solid var(--c-other);
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .card:hover{
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    .card:active{ transform: scale(0.98); }
    .card.cat-日式{ border-left-color: var(--c-jp); }
    .card.cat-西式{ border-left-color: var(--c-western); }
    .card.cat-港式{ border-left-color: var(--c-hk); }
    .card.cat-韓式{ border-left-color: var(--c-kr); }
    .card.cat-泰式{ border-left-color: var(--c-thai); }
    .card.cat-火鍋{ border-left-color: var(--c-hotpot); }
    .card.cat-多國{ border-left-color: var(--c-western); }
    .card.cat-小食{ border-left-color: var(--c-snack); }
    .card.cat-台式{ border-left-color: var(--c-kr); }
    .card.cat-潮州{ border-left-color: var(--c-jp); }
    .card.cat-滬菜{ border-left-color: var(--c-jp); }
    .name{
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 12px 0;
      padding-right: 60px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .newBadge{
      background: #ff4757;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 800;
      text-transform: uppercase;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .meta{
      display: grid;
      gap: 10px;
    }
    .row{
      display: flex;
      font-size: 14px;
      align-items: center;
      min-height: 32px;
    }
    .k{
      width: 75px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .v{
      color: var(--text);
      font-weight: 500;
      flex: 1;
    }
    .miniGroup{
      display: flex;
      gap: 6px;
      margin-top: 4px;
      justify-content: center;
    }
    .btn{
      border: 1px solid var(--line);
      background: #fff;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn.active{
      background: var(--brand-light);
      border-color: var(--brand);
      color: var(--brand);
    }
    .btn.danger.active{ background: #fee2e2; border-color: var(--bad); color: var(--bad); }
    .btn:active{transform: translateY(1px)}

    .empty{
      padding: 22px 14px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align:center;
      background: rgba(255,255,255,.70);
    }

    footer{
      margin-top: 16px;
      color: rgba(15,23,42,.65);
      font-size: 12px;
      line-height: 1.2rem;
    }
    footer a{color: rgba(15,23,42,.85)}
    .note{
      border: 1px solid var(--line);
      background: rgba(255,255,255,.70);
      border-radius: var(--radius);
      padding: 12px;
      margin-top: 10px;
    }
  </style>
</head>

    const categories = ["全部","港式","日式","西式","韓式","泰式","火鍋","多國","小食"];
    const PAGE_SIZE = 10;
    const state = { category: "全部", q: "", sortByDist: false, page: 1 };

    const elList = document.getElementById("list");
    const elStats = document.getElementById("stats");
    const elChips = document.getElementById("chips");
    const elQ = document.getElementById("q");
    const elUpdateTime = document.getElementById("updateTime");

    if(elUpdateTime){
      const built = restaurants[0]?.updatedAt || "每週自動更新";
      elUpdateTime.textContent = built !== "每週自動更新" ? `最後更新：${built}` : '';
    }

    const STORAGE_KEY = "yuenLongFood_userState_v1";
    let userState = loadUserState();

    function loadUserState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return {};
        const obj = JSON.parse(raw);
        if(obj && typeof obj === "object") return obj;
        return {};
      }catch(e){
        return {};
      }
    }

    function saveUserState(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userState));
      }catch(e){
        // ignore
      }
    }

    function mapsUrlForAddress(address){
      const q = encodeURIComponent(`香港 ${address}`);
      return `https://www.google.com/maps/search/?api=1&query=${q}`;
    }

    // 元朗中心點座標
    const YUEN_LONG_CENTER = { lat: 22.4456, lng: 114.0229 };
    let userLocation = null;

    // Haversine 公式計算距離（km）
    function haversine(lat1, lng1, lat2, lng2){
      const R = 6371;
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat/2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // 計算餐廳與用戶（或元朗中心）的距離
    function calcDist(r){
      if(!r.lat || !r.lng) return null;
      const ref = userLocation || YUEN_LONG_CENTER;
      return haversine(ref.lat, ref.lng, r.lat, r.lng);
    }

    // 按距離排序
    function sortByDistance(items){
      return items.slice().sort((a, b) => {
        const da = calcDist(a);
        const db = calcDist(b);
        if(da === null && db === null) return 0;
        if(da === null) return 1;
        if(db === null) return -1;
        return da - db;
      });
    }

    function doGeolocation(btn){
      if(!navigator.geolocation){
        alert("您的瀏覽器不支援定位功能。");
        return;
      }
      if(btn) btn.textContent = "📍 定位中…";
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          state.sortByDist = true;
          if(btn) btn.textContent = "📍 已按距離排序 ✓";
          render(true);
        },
        (err) => {
          alert("無法取得位置，請確保已允許位置權限。");
          if(btn) btn.textContent = "📍 距離排序";
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function normalize(s){ return (s || "").toString().trim().toLowerCase(); }

    function filterItems(){
      const q = normalize(state.q);
      return restaurants.filter(r => {
        const okCat = state.category === "全部" ? true : (r.category === state.category);
        if(!okCat) return false;
        if(!q) return true;
        const hay = [
          r.name, r.category, r.price, r.address,
          ...(r.tags||[])
        ].map(normalize).join(" ");
        return hay.includes(q);
      });
    }

    function renderChips(){
      elChips.innerHTML = "";
      for(const c of categories){
        const b = document.createElement("button");
        b.className = "chip" + (state.category === c ? " active" : "");
        b.type = "button";
        b.textContent = c;
        b.addEventListener("click", () => {
          state.category = c;
          render(true);
        });
        elChips.appendChild(b);
      }
    }

    function renderStats(items){
      const total = restaurants.length;
      const shown = items.length;
      const end = Math.min(state.page * PAGE_SIZE, shown);
      elStats.innerHTML = `
        <span>顯示 <strong>${end}</strong> / ${shown} <span style="color:var(--muted);font-size:12px;">（共 ${total} 間）</span></span>
        <span>｜</span>
        <span>地區：<strong>香港元朗</strong></span>
        <span>｜</span>
        <button class="chip sortBtn" type="button" id="sortDistanceBtn" title="使用GPS定位計算距離">📍 距離排序</button>
      `;
    }

    function ratingText(r){
      if(typeof r.rating === "number" && isFinite(r.rating)){
        return `${r.rating.toFixed(1)}/5`;
      }
      return "—";
    }

    function cuisineLabel(r){
      const parts = Array.isArray(r.tags) ? r.tags.filter(Boolean).slice(0, 3) : [];
      if(parts.length > 0) return parts.join(" / ");
      return r.category || "—";
    }

    function card(r){
      const u = userState[r.id] || {};
      const verdict = typeof u.verdict === "string" ? u.verdict : null;

      const openrice = r.openriceUrl;
      const maps = mapsUrlForAddress(r.address);
      const catClass = r.category?.replace(/[^a-zA-Z\u4e00-\u9fff]/g, '') || '其他';
      const dist = calcDist(r);
      const distText = (dist !== null) ? (dist < 1 ? (dist*1000).toFixed(0) + "m" : dist.toFixed(1) + "km") : null;
      const distBadgeHtml = distText ? `<span class="distBadge">📍 ${distText}</span>` : "";
      const distRowHtml = distText ? `<div class="row" style="color:var(--brand);"><div class="k">距離</div><div class="v"><strong>${distText}</strong></div></div>` : "";
      return `
        <section class="card cat-${escapeAttr(catClass)}" data-id="${escapeAttr(r.id)}" onclick="window.open('${escapeAttr(openrice)}', '_blank')">
          <div class="cornerCuisine cat-${escapeAttr(catClass)}" title="${escapeAttr(cuisineLabel(r))}">${escapeHtml(cuisineLabel(r))}</div>
          <div class="cardTop">
            <h2 class="name">${escapeHtml(r.name)}${r.isNew ? '<span class="newBadge">新</span>' : ''}${distBadgeHtml}</h2>
          </div>
          <div class="meta">
            <div class="row"><div class="k">評分</div><div class="v"><strong>${escapeHtml(ratingText(r))}</strong> <span style="color: var(--muted);">（<a href="${escapeAttr(openrice)}" target="_blank" rel="noopener">OpenRice 連結</a>）</span></div></div>
            <div class="row"><div class="k">你的評價</div><div class="v">${verdict ? `<span class="miniGroup" aria-label="評價按鈕">
              <button class="btn danger ${verdict === "垃圾" ? "active" : ""}" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="垃圾">垃圾</button>
              <button class="btn neutral ${verdict === "正常" ? "active" : ""}" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="正常">正常</button>
              <button class="btn ${verdict === "好食" ? "active" : ""}" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="好食">好食</button>
              <button class="btn" type="button" data-clear-verdict="${escapeAttr(r.id)}">清除</button>
            </span>` : `<span class="miniGroup" aria-label="評價按鈕">
              <button class="btn danger" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="垃圾">垃圾</button>
              <button class="btn neutral" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="正常">正常</button>
              <button class="btn" type="button" data-set-verdict="${escapeAttr(r.id)}" data-verdict="好食">好食</button>
            </span>`}</div></div>
            <div class="row"><div class="k">OpenRice</div><div class="v">食評數：${Number(r.reviewCount)||0} ｜ 瀏覽：${escapeHtml(r.viewCountText||"—")}</div></div>
            <div class="row"><div class="k">人均</div><div class="v">${escapeHtml(r.price)}</div></div>
            <div class="row"><div class="k">地址</div><div class="v"><a href="${escapeAttr(maps)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">${escapeHtml(r.address)}</a></div></div>
            ${distRowHtml}
          </div>
        </section>
      `;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll("\"","&quot;")
        .replaceAll("'","&#39;");
    }
    function escapeAttr(s){ return escapeHtml(s).replaceAll("`","&#96;"); }

    function render(resetPage){
      if(resetPage) state.page = 1;
      renderChips();
      let items = filterItems();
      if(state.sortByDist && userLocation){
        items = sortByDistance(items);
      }
      const totalShown = items.length;
      const end = state.page * PAGE_SIZE;
      const pageItems = items.slice(0, end);
      renderStats(items);
      if(items.length === 0){
        elList.innerHTML = `<div class="empty">冇搵到結果。試下改搜尋字，或者切換分類。</div>`;
      }else{
        let html = pageItems.map(card).join("");
        if(end < totalShown){
          html += `<div id="loadMore" style="text-align:center;padding:20px 0;">
            <button class="btn" type="button" id="loadMoreBtn" style="width:100%;padding:12px;font-size:14px;font-weight:600;">下拉或點擊載入更多（${totalShown - end} 間）</button>
          </div>`;
        }else if(totalShown > 0){
          html += `<div style="text-align:center;padding:16px 0;color:var(--muted);font-size:13px;">— 已顯示全部 ${totalShown} 間餐廳 —</div>`;
        }
        elList.innerHTML = html;
      }

      const loadBtn = document.getElementById("loadMoreBtn");
      if(loadBtn){
        loadBtn.onclick = () => {
          state.page++;
          render(false);
        };
      }

      const sortBtn = document.getElementById("sortDistanceBtn");
      if(sortBtn){
        sortBtn.onclick = () => {
          doGeolocation(sortBtn);
        };
      }

      elList.querySelectorAll("button[data-set-verdict]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-set-verdict");
          const v = btn.getAttribute("data-verdict");
          if(!id || !v) return;
          const cur = userState[id] || {};
          userState[id] = { ...cur, verdict: v, visited: true };
          saveUserState();
          render(false);
        });
      });

      elList.querySelectorAll("button[data-clear-verdict]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-clear-verdict");
          if(!id) return;
          const cur = userState[id] || {};
          const next = { ...cur };
          delete next.verdict;
          userState[id] = next;
          saveUserState();
          render(false);
        });
      });
    }

    let scrollTimer = null;
    window.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const listEnd = document.getElementById("loadMore");
        if(!listEnd) return;
        const rect = listEnd.getBoundingClientRect();
        if(rect.top < window.innerHeight + 100){
          state.page++;
          render(false);
        }
      }, 200);
    });

    elQ.addEventListener("input", (e) => {
      state.q = e.target.value || "";
      render(true);
    });

    render(true);
  </script>
