        if(end < totalShown){
          html += `<div id="loadMore" style="text-align:center;padding:20px 0;">
            <button class="btn" type="button" id="loadMoreBtn" style="width:100%;padding:12px;font-size:14px;font-weight:600;">涓嬫媺鎴栭粸鎿婅級鍏ユ洿澶氾紙${totalShown - end} 闁擄級</button>
          </div>`;
        }else if(totalShown > 0){
          html += `<div style="text-align:center;padding:16px 0;color:var(--muted);font-size:13px;">鈥?宸查’绀哄叏閮?${totalShown} 闁撻寤?鈥?/div>`;
        }
        elList.innerHTML = html;
      }

      const loadBtn = document.getElementById("loadMoreBtn");
      if(loadBtn){
        loadBtn.onclick = () => {
          state.page++;
          render(false);
        };
      }

      const sortBtn = document.getElementById("sortDistanceBtn");
      if(sortBtn){
        sortBtn.onclick = () => {
          state.page = 1;
          doGeolocation();
        };
      }

      elList.querySelectorAll("button[data-set-verdict]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-set-verdict");
          const v = btn.getAttribute("data-verdict");
          if(!id || !v) return;
          const cur = userState[id] || {};
          userState[id] = { ...cur, verdict: v, visited: true };
          saveUserState();
          render(false);
        });
      });

      elList.querySelectorAll("button[data-clear-verdict]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-clear-verdict");
          if(!id) return;
          const cur = userState[id] || {};
          const next = { ...cur };
          delete next.verdict;
          userState[id] = next;
          saveUserState();
          render(false);
        });
      });
    }

    let scrollTimer = null;
    window.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const listEnd = document.getElementById("loadMore");
        if(!listEnd) return;
        const rect = listEnd.getBoundingClientRect();
        if(rect.top < window.innerHeight + 100){
          state.page++;
          render(false);
        }
      }, 200);
    });

    elQ.addEventListener("input", (e) => {
      state.q = e.target.value || "";
      render(true);
    });

    render(true);
  </script>
